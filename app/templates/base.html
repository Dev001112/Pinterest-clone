<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}PinBoard{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <!-- IMPORTANT: correct static path + filename -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

 <!-- flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="container mt-3">
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

{% block body %}{% endblock %}

<!-- Global Pin Modal -->
<div class="modal fade" id="globalPinModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg modal-bg" style="border-radius: 24px; overflow: hidden; height: 85vh;">
      <button type="button" class="btn-close position-absolute top-0 end-0 m-4 z-3 bg-white p-2 rounded-circle shadow-sm" data-bs-dismiss="modal" aria-label="Close"></button>
      <div class="row g-0 h-100">
        <div class="col-md-7 img-bg d-flex align-items-center justify-content-center h-100 position-relative">
          <img id="pinModalImage" src="" class="img-fluid w-100 h-100" style="object-fit: contain;" alt="Pin image">
        </div>
        <div class="col-md-5 p-4 d-flex flex-column h-100 overflow-hidden modal-bg sidebar-theme">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 id="pinModalTitle" class="fw-bold mb-0 text-color"></h3>
            <a id="pinModalDownload" href="#" download class="btn btn-outline-dark btn-sm rounded-pill ms-2 dl-btn">Download</a>
          </div>
          <p id="pinModalDesc" class="text-muted fs-6 mb-3"></p>
          <div class="pb-3 border-bottom mb-3">
             <div class="d-flex align-items-center gap-3">
                <div id="pinModalAuthorAvatar" class="navbar-avatar" style="width: 48px; height: 48px; font-size: 1.2rem;"></div>
                <div class="d-flex flex-column">
                  <span class="text-muted small mb-0 lh-1">Uploaded by</span>
                  <span id="pinModalAuthor" class="fw-bold fs-5 lh-1 mt-1 text-color"></span>
                </div>
             </div>
          </div>
          
          <!-- Comments Section -->
          <div class="flex-grow-1 overflow-auto pe-2" id="pinModalCommentsList">
             <!-- Comments populated here -->
          </div>
          <div class="mt-3 pt-3 border-top">
            <form id="commentForm" class="d-flex gap-2">
               <input type="hidden" id="pinModalId">
               <input type="text" class="form-control rounded-pill text-input" id="commentTextInput" placeholder="Add a comment..." required>
               <button type="submit" class="btn btn-primary-red rounded-pill">Post</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  window.openPinModal = function(pinId, imgSrc, title, desc, author, authorInitial) {
    const modalEl = document.getElementById("globalPinModal");
    if (!modalEl) return;
    document.getElementById("pinModalId").value = pinId;
    document.getElementById("pinModalImage").src = imgSrc;
    document.getElementById("pinModalTitle").textContent = title;
    document.getElementById("pinModalDesc").textContent = (desc && desc !== "null" && desc !== "None") ? desc : "";
    document.getElementById("pinModalAuthor").textContent = author;
    document.getElementById("pinModalAuthorAvatar").textContent = authorInitial;
    
    // Download link
    document.getElementById("pinModalDownload").href = imgSrc;
    
    // Fetch comments
    const commentsList = document.getElementById("pinModalCommentsList");
    commentsList.innerHTML = '<div class="text-center text-muted small mt-2">Loading comments...</div>';
    
    fetch('/api/pins/' + pinId + '/comments')
      .then(r => r.json())
      .then(data => {
        commentsList.innerHTML = '';
        if (!data.comments || data.comments.length === 0) {
           commentsList.innerHTML = '<div class="text-muted small mt-2">No comments yet! Be the first to comment.</div>';
        } else {
           data.comments.forEach(c => {
             commentsList.innerHTML += `
               <div class="d-flex gap-2 mb-3">
                 <div class="navbar-avatar" style="width:32px; height:32px; font-size:0.8rem;">${c.author_initial}</div>
                 <div>
                   <div class="fw-bold small text-color">${c.author} <span class="fw-normal text-muted ms-1" style="font-size:0.75rem">${c.created_at}</span></div>
                   <div class="small text-color">${c.text}</div>
                 </div>
               </div>
             `;
           });
           commentsList.scrollTop = commentsList.scrollHeight;
        }
      }).catch(e => {
        commentsList.innerHTML = '<div class="text-danger small mt-2">Failed to load comments.</div>';
      });
      
    // Don't show again if it's already shown open (prevent modal backdrop stacking)
    const bsModal = bootstrap.Modal.getInstance(modalEl);
    if (!bsModal || !modalEl.classList.contains('show')) {
      new bootstrap.Modal(modalEl).show();
    }
  };

  document.addEventListener("click", (e) => {
    if (e.target.closest(".pin-card-img-wrapper") && !e.target.closest(".action-btn")) {
      const wrapper = e.target.closest(".pin-card-img-wrapper");
      
      // if it has the inline onclick from the js polling, it handles it itself
      if (wrapper.hasAttribute("onclick")) return;

      const card = wrapper.closest(".pin-card");
      if (card) {
        const likeBtn = card.querySelector(".like-btn");
        const pinId = likeBtn ? likeBtn.dataset.pin : "";
        const img = card.querySelector(".pin-card-img").src;
        const titleEl = card.querySelector(".pin-title");
        const title = titleEl ? titleEl.textContent.trim() : "";
        const descEl = card.querySelector(".pin-desc");
        const desc = descEl ? descEl.textContent.trim() : "";
        const authorEl = card.querySelector(".pin-author span");
        const author = authorEl ? authorEl.textContent.trim() : "Unknown";
        const authorInitial = author ? author[0].toUpperCase() : "U";
        
        window.openPinModal(pinId, img, title, desc, author, authorInitial);
      }
    }
  });

  document.addEventListener("DOMContentLoaded", () => {
    const commentForm = document.getElementById("commentForm");
    if(commentForm) {
      commentForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const pinId = document.getElementById("pinModalId").value;
        const textInput = document.getElementById("commentTextInput");
        const text = textInput.value.trim();
        if(!text || !pinId) return;
        
        textInput.disabled = true;
        try {
           const res = await fetch('/api/pins/' + pinId + '/comments', {
             method: "POST",
             headers: { "Content-Type": "application/json" },
             body: JSON.stringify({ text })
           });
           if (res.ok) {
             textInput.value = "";
             // Refetch comments logic - simplest way is to just call openPinModal again to reload everything
             window.openPinModal(pinId, document.getElementById("pinModalImage").src, document.getElementById("pinModalTitle").textContent, document.getElementById("pinModalDesc").textContent, document.getElementById("pinModalAuthor").textContent, document.getElementById("pinModalAuthorAvatar").textContent);
           }
        } catch(err) { console.error(err); }
        textInput.disabled = false;
        textInput.focus();
      });
    }
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
